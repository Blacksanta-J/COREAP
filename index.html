<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerencia Operativa - Clasificación y Disciplina Docente</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;600&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --az: #153244;
  --az-hover: #1a3d54;
  --am: #FFCC00;
  --am-light: #fff8cc;
  --cy: #8DE2D6;
  --cy-light: #e8f9f7;
  --cy-mid: #c5f0eb;
  --gr: #3C3C3B;
  --gr-light: #6b6b6a;
  --wh: #FCFCFC;
  --bg: #f0f2f4;
  --surface: #ffffff;
  --border: #e2e6ea;
  --border-strong: #c8cdd3;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.05);
  font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
}

body {
  background: var(--bg);
  color: var(--gr);
}

/* ── Topbar ─────────────────────────────────── */
.topbar {
  background: var(--az);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-logo {
  display: flex;
  align-items: center;
  opacity: .95;
  transition: opacity .2s;
}

.topbar-logo:hover {
  opacity: 1;
}

.topbar-title {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,.85);
  letter-spacing: .8px;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.7;
  font-family: 'Source Sans 3', sans-serif;
}

.topbar-title span {
  color: var(--cy);
  font-weight: 300;
  letter-spacing: .3px;
}

/* ── Main Navigation ─────────────────────────────────── */
.main-nav {
  background: var(--surface);
  border-bottom: 2px solid var(--am);
  box-shadow: var(--shadow);
  position: sticky;
  top: 68px;
  z-index: 99;
}

.main-nav-container {
  max-width: 1380px;
  margin: 0 auto;
  display: flex;
  gap: 4px;
  padding: 0 40px;
}

.main-nav-btn {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 16px 24px;
  margin-bottom: -2px;
  font-family: 'Source Sans 3', inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--gr-light);
  letter-spacing: .4px;
  text-transform: uppercase;
  transition: color .15s, border-color .15s, background .15s;
  display: flex;
  align-items: center;
  gap: 10px;
}

.main-nav-btn:hover {
  color: var(--az);
  background: var(--cy-light);
}

.main-nav-btn.active {
  color: var(--az);
  border-bottom-color: var(--am);
  background: linear-gradient(to bottom, var(--cy-light), transparent);
}

.main-nav-icon {
  font-size: 16px;
}

/* ── Content Container ─────────────────────────────────── */
.content-container {
  max-width: 1380px;
  margin: 0 auto;
  padding: 0;
}

.section-content {
  display: none;
}

.section-content.active {
  display: block;
}

/* ── Dashboard Section ─────────────────────────────────── */
.dashboard-section {
  padding: 40px;
}

.dashboard-header {
  margin-bottom: 32px;
}

.dashboard-header h1 {
  font-size: 28px;
  font-weight: 700;
  color: var(--az);
  margin-bottom: 8px;
}

.dashboard-header p {
  font-size: 14px;
  color: var(--gr-light);
}

.dashboard-frame {
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}

.dashboard-frame iframe {
  width: 100%;
  height: 800px;
  border: none;
  display: block;
}

/* ── Section Frame ─────────────────────────────────── */
.section-frame {
  background: var(--surface);
  min-height: calc(100vh - 200px);
}

.section-frame iframe {
  width: 100%;
  min-height: calc(100vh - 200px);
  border: none;
  display: block;
}

/* ── Welcome Section ─────────────────────────────────── */
.welcome-section {
  padding: 60px 40px;
  text-align: center;
}

.welcome-content {
  max-width: 800px;
  margin: 0 auto;
}

.welcome-content h1 {
  font-size: 36px;
  font-weight: 700;
  color: var(--az);
  margin-bottom: 16px;
  letter-spacing: -.5px;
}

.welcome-content p {
  font-size: 16px;
  color: var(--gr-light);
  line-height: 1.8;
  margin-bottom: 40px;
}

.quick-links {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
  margin-top: 48px;
}

.quick-link-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px 24px;
  text-align: center;
  cursor: pointer;
  transition: all .25s;
  box-shadow: var(--shadow);
}

.quick-link-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
  border-color: var(--cy);
}

.quick-link-icon {
  font-size: 48px;
  margin-bottom: 16px;
  color: var(--az);
}

.quick-link-card h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--az);
  margin-bottom: 8px;
}

.quick-link-card p {
  font-size: 13px;
  color: var(--gr-light);
  line-height: 1.6;
}

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 768px) {
  .topbar {
    padding: 12px 20px;
  }
  
  .main-nav-container {
    padding: 0 20px;
  }
  
  .main-nav-btn {
    font-size: 11px;
    padding: 12px 16px;
  }
  
  .dashboard-section,
  .welcome-section {
    padding: 24px 20px;
  }
  
  .quick-links {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-logo">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="#FFCC00"/>
      <path d="M14 18h20M14 24h20M14 30h14" stroke="#153244" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="topbar-title">
    Gerencia Operativa de<br>
    <span>Clasificación y Disciplina Docente</span>
  </div>
</div>

<!-- Main Navigation -->
<nav class="main-nav">
  <div class="main-nav-container">
    <button class="main-nav-btn active" onclick="showSection('dashboard')">
      <span class="main-nav-icon">📊</span>
      Dashboard
    </button>
    <button class="main-nav-btn" onclick="showSection('actopublico')">
      <span class="main-nav-icon">📋</span>
      Acto Público
    </button>
    <button class="main-nav-btn" onclick="showSection('clasificacion')">
      <span class="main-nav-icon">🎓</span>
      Clasificación Docente
    </button>
  </div>
</nav>

<!-- Content Container -->
<div class="content-container">
  
  <!-- Dashboard Section -->
  <div id="dashboard" class="section-content active">
    <div class="dashboard-section">
      <div class="dashboard-header">
        <h1>Panel de Control</h1>
        <p>Seguimiento de tareas y estatus de la Gerencia Operativa</p>
      </div>
      <div class="dashboard-frame">
        <iframe src="seguimiento.html" title="Dashboard de Seguimiento"></iframe>
      </div>
    </div>
  </div>

  <!-- Acto Público Section -->
  <div id="actopublico" class="section-content">
    <div class="section-frame">
      <iframe src="actopublico.html" title="Acto Público"></iframe>
    </div>
  </div>

  <!-- Clasificación Docente Section -->
  <div id="clasificacion" class="section-content">
    <div class="section-frame">
      <iframe src="clasificacion.html" title="Clasificación Docente"></iframe>
    </div>
  </div>

</div>

<script>
function showSection(sectionId) {
  // Hide all sections
  document.querySelectorAll('.section-content').forEach(section => {
    section.classList.remove('active');
  });
  
  // Remove active state from all nav buttons
  document.querySelectorAll('.main-nav-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  
  // Show selected section
  document.getElementById(sectionId).classList.add('active');
  
  // Add active state to clicked button
  event.target.closest('.main-nav-btn').classList.add('active');
  
  // Update URL hash without scrolling
  if (history.pushState) {
    history.pushState(null, null, '#' + sectionId);
  } else {
    location.hash = '#' + sectionId;
  }
}

// Handle initial load and hash changes
function handleHashChange() {
  const hash = window.location.hash.substring(1);
  if (hash && ['dashboard', 'actopublico', 'clasificacion'].includes(hash)) {
    const section = document.getElementById(hash);
    if (section) {
      document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.main-nav-btn').forEach(b => b.classList.remove('active'));
      
      section.classList.add('active');
      const btnIndex = hash === 'dashboard' ? 0 : hash === 'actopublico' ? 1 : 2;
      document.querySelectorAll('.main-nav-btn')[btnIndex].classList.add('active');
    }
  }
}

// Listen for hash changes
window.addEventListener('hashchange', handleHashChange);

// Handle initial load
window.addEventListener('load', handleHashChange);
</script>

</body>
</html>
